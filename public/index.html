<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire AI - Mahipal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f0f10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; height: 100vh; }
        
        .chat-container { width: 100%; max-width: 500px; background: #1a1a1d; display: flex; flex-direction: column; position: relative; }
        
        /* Header */
        .header { padding: 20px; background: linear-gradient(to right, var(--primary), var(--secondary)); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header h2 { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Chat Box */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.6; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        
        /* User vs Bot Bubble */
        .user-msg { align-self: flex-end; background: var(--secondary); color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #2d2d30; color: #e0e0e0; border-bottom-left-radius: 2px; border: 1px solid #3f3f42; }

        /* Markdown Styles inside Bubbles */
        .bot-msg h1, .bot-msg h2, .bot-msg h3 { margin-bottom: 8px; color: var(--primary); }
        .bot-msg ul, .bot-msg ol { margin-left: 20px; margin-bottom: 8px; }

        /* Image Styling */
        .gen-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid var(--primary); cursor: pointer; transition: 0.3s; }
        .gen-img:hover { transform: scale(1.02); }

        /* Input Area */
        .input-area { padding: 20px; background: #252529; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 14px 20px; border-radius: 25px; border: none; background: #333338; color: white; outline: none; font-size: 1rem; }
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { background: var(--secondary); transform: rotate(-10deg); }

        /* Typing Animation */
        .typing { font-style: italic; font-size: 0.8rem; color: #888; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div>
            <h2>Empire AI</h2>
            <p style="font-size: 0.7rem; opacity: 0.8;">V2.0 | Advanced Context</p>
        </div>
        <button id="muteBtn" onclick="toggleMute()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">🔊</button>
    </div>

    <div id="chat-box"></div>
    <div id="typing" class="typing" style="margin-left:20px;">Empire AI Type kar raha hai...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Kuch bhi pucho ya 'photo banao'..." autocomplete="off">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing');
    let isMuted = false;

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').innerText = isMuted ? "🔈" : "🔊";
    }

    function speak(text) {
        if (isMuted) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        msg.pitch = 0.9;
        window.speechSynthesis.speak(msg);
    }

    async function send() {
        const text = input.value.trim();
        if (!text) return;

        // User Message
        box.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        // Check for Image Request
        const imgKeywords = ["photo", "image", "pic", "banao", "dikhao", "generate"];
        if (imgKeywords.some(k => text.toLowerCase().includes(k))) {
            const imgId = "img-" + Date.now();
            box.innerHTML += `<div class="message bot-msg" id="${imgId}">Theek hai bhai, aapke liye image taiyar kar raha hoon...</div>`;
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&model=flux`;
            
            setTimeout(() => {
                document.getElementById(imgId).innerHTML = `Bhai, dekho kaisi bani hai:<br><img src="${imgUrl}" class="gen-img" onclick="window.open(this.src)">`;
                box.scrollTop = box.scrollHeight;
                speak("Bhai, aapki photo taiyar hai.");
            }, 2000);
            return;
        }

        // Chat Request
        typing.style.display = 'block';
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            typing.style.display = 'none';

            // Use Marked.js to render Markdown
            const formattedReply = marked.parse(data.reply);
            box.innerHTML += `<div class="message bot-msg">${formattedReply}</div>`;
            box.scrollTop = box.scrollHeight;
            speak(data.reply.replace(/[#*`]/g, '')); // Clean text for voice
        } catch (e) {
            typing.style.display = 'none';
            box.innerHTML += `<div class="message bot-msg">Bhai, server down lag raha hai!</div>`;
        }
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
