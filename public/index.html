<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire AI - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0f10; --card: #1a1a1d; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 15px; background: #161618; border-bottom: 1px solid #333; text-align: center; font-weight: bold; color: var(--primary); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #3a7bd5; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* Login Overlay */
        #login-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-card { background: #1a1a1d; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; max-width: 300px; }

        .input-area { padding: 15px; background: #161618; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #252529; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        button { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--primary);">Limit Reached!</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">Bhai, guest limit khatam ho gayi hai. Aage ki chat ke liye login karein.</p>
        <button onclick="mockLogin()" style="width:100%; padding:12px; border-radius:10px; border:none; background:white; font-weight:bold; cursor:pointer;">Google se Login karein</button>
        <p style="font-size: 0.7rem; margin-top:10px; color:#555;">(Google Login setup kal hoga, abhi test ke liye click karein)</p>
    </div>
</div>

<div class="header">EMPIRE AI PRO</div>
<div id="chat-box">
    <div class="msg bot">Hello! How can I assist you today?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
    <button onclick="send()">🚀</button>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const overlay = document.getElementById('login-overlay');

    // Simple Session & Access Control
    let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    let msgCount = parseInt(localStorage.getItem('msgCount')) || 0;

    function mockLogin() {
        localStorage.setItem('isLoggedIn', 'true');
        isLoggedIn = true;
        overlay.style.display = 'none';
        alert("Bhai, aap login ho chuke ho! Ab unlimited chat karo.");
    }

    async function send() {
        // Access Check
        if (!isLoggedIn && msgCount >= 5) {
            overlay.style.display = 'flex';
            return;
        }

        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        // Increment count only for guests
        if (!isLoggedIn) {
            msgCount++;
            localStorage.setItem('msgCount', msgCount);
        }

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg bot">${marked.parse(data.reply)}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (e) {
            box.innerHTML += `<div class="msg bot">Error: Net check karo bhai!</div>`;
        }
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
